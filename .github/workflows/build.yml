name: Release Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: IeltsSpeakingAssistantExtractor.exe
            release_name: IeltsSpeakingAssistantExtractor-Windows.exe
            name: Windows
          - os: ubuntu-latest
            rid: linux-x64
            artifact: IeltsSpeakingAssistantExtractor
            release_name: IeltsSpeakingAssistantExtractor-Linux
            name: Linux
          - os: macos-latest
            rid: osx-arm64
            artifact: IeltsSpeakingAssistantExtractor
            release_name: IeltsSpeakingAssistantExtractor-macOS
            name: macOS

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        dotnet-quality: 'preview'

    - name: Restore dependencies
      run: dotnet restore IeltsSpeakingAssistantExtractor/IeltsSpeakingAssistantExtractor.csproj

    - name: Publish
      run: |
        dotnet publish IeltsSpeakingAssistantExtractor/IeltsSpeakingAssistantExtractor.csproj -c Release -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -o publish
      shell: bash

    - name: Rename artifact for release
      run: cp publish/${{ matrix.artifact }} publish/${{ matrix.release_name }}
      shell: bash

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.name }}
        path: publish/${{ matrix.release_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref_name }}
        name: IeltsSpeakingAssistantExtractor ${{ github.ref_name }}
        generate_release_notes: true
        files: artifacts/**/*
